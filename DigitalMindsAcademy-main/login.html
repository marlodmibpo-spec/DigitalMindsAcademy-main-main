<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DigitalMinds Academy Login</title>
    <link rel="stylesheet" href="login.css">
</head>

<body>
    <div class="page-shell">
        <div class="hexagon-bg" aria-hidden="true">
            <span class="hex"></span>
            <span class="hex"></span>
            <span class="hex"></span>
            <span class="hex"></span>
            <span class="hex"></span>
            <span class="hex"></span>
            <span class="hex"></span>
            <span class="hex"></span>
            <span class="hex"></span>
            <span class="hex"></span>
            <span class="hex"></span>
            <span class="hex"></span>
            <span class="hex"></span>
            <span class="hex"></span>
            <span class="hex"></span>
            <span class="hex"></span>
            <span class="hex"></span>
            <span class="hex"></span>
            <span class="hex"></span>
        </div>
        <div class="container">
            <div class="login-box">
                <img src="images/dmiacademylogo.png" class="logo">
                <p class="signup-message" id="signupMessage" role="status" aria-live="polite"></p>
                <p class="login-message" id="loginMessage" role="status" aria-live="polite"></p>
                <div class="input-group">
                    <label>Email</label>
                    <input type="email" id="email" placeholder="">
                </div>
                <div class="input-group">
                    <label>Password</label>
                    <div class="password-box">
                        <input type="password" id="password">
                    </div>
                </div>
                <div class="options">
                    <label><input type="checkbox"> Remember me?</label>
                    <a href="#">Forgot your password?</a>
                </div>
                <button onclick="login()">Login</button>
            </div>
            <div class="gradient-box"></div>
            <div class="image-section">
                <div class="image-frame">
                    <img src="images/loginmodel.png">
                </div>
            </div>
        </div>
        <footer>
            <a href="#">About Us</a>
            <a href="#">Contact Us</a>
            <a href="#">Terms of Use</a>
        </footer>
        <div id="loginOverlay" class="login-overlay" aria-live="assertive" aria-busy="true">
            <div class="overlay-card">
                <div class="spinner" aria-hidden="true"></div>
                <p class="overlay-text">Logging in...</p>
            </div>
        </div>
    </div>
        <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.min.js"></script>
        <script src="supabaseClient.js"></script>
        <script src="auth.js"></script>
        <script src="login.js"></script>
    </body>
</html>
