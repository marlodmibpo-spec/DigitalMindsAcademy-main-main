<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DigitalMinds Academy Signup</title>
    <link rel="stylesheet" href="signup.css">
</head>

<body>
    <div class="page-shell">
        <div class="hexagon-bg" aria-hidden="true">
            <span class="hex"></span>
            <span class="hex"></span>
            <span class="hex"></span>
            <span class="hex"></span>
            <span class="hex"></span>
            <span class="hex"></span>
            <span class="hex"></span>
            <span class="hex"></span>
            <span class="hex"></span>
            <span class="hex"></span>
            <span class="hex"></span>
            <span class="hex"></span>
            <span class="hex"></span>
            <span class="hex"></span>
            <span class="hex"></span>
            <span class="hex"></span>
            <span class="hex"></span>
            <span class="hex"></span>
            <span class="hex"></span>
        </div>
        <div class="container">
            <div class="signup-box">
                <img src="images/dmiacademylogo.png" class="logo" alt="DigitalMinds Academy">
                <div class="name-row">
                    <div class="input-group">
                        <label for="firstName">Firstname</label>
                        <input type="text" id="firstName" placeholder="">
                    </div>
                    <div class="input-group">
                        <label for="surname">Surname</label>
                        <input type="text" id="surname" placeholder="">
                    </div>
                </div>
                <div class="input-group">
                    <label for="email">Email</label>
                    <input type="email" id="email" placeholder="">
                </div>
                <div class="input-group">
                    <label for="role">Role</label>
                    <input type="text" id="role" value="admin" readonly>
                </div>
                <div class="input-group">
                    <label for="password">Password</label>
                    <div class="password-box">
                        <input type="password" id="password">
                    </div>
                </div>
                <div class="input-group">
                    <label for="confirmPassword">Confirm Password</label>
                    <div class="password-box">
                        <input type="password" id="confirmPassword">
                    </div>
                </div>
                <div class="options">
                    <label><input type="checkbox" id="terms"> I agree to the terms</label>
                    <a href="login.html">Already have an account?</a>
                </div>
                <button onclick="signup()">Create Account</button>
            </div>
            <div class="gradient-box"></div>
            <div class="image-section">
                <div class="image-frame">
                    <img src="images/loginmodel.png" alt="Student illustration">
                </div>
            </div>
        </div>
        <footer>
            <a href="#">About Us</a>
            <a href="#">Contact Us</a>
            <a href="#">Terms of Use</a>
        </footer>
    </div>
        <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.min.js"></script>
        <script src="supabaseClient.js"></script>
        <script src="signup.js"></script>
    </body>
</html>
