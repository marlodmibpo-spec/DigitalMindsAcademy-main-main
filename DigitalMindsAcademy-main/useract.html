<!DOCTYPE html>
<html lang="en">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Uploaded Activities</title>

<link rel="stylesheet" href="useract.css">

<link rel="stylesheet"
href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.min.js"></script>
<script src="supabaseClient.js"></script>
<script src="logout.js" defer></script>
<script src="profileInfo.js"></script>
<script src="useract.js" defer></script>

</head>

<body>

<div class="dashboard">

<!-- HEADER -->
<header class="header">
<div class="logo">
<img src="images/dmilogo.png">
</div>
</header>

<!-- SIDEBAR -->
<aside class="sidebar">

<div class="profile">
  <img src="images/logo-user-inteface.png" class="profile-img">
  <div class="profile-info">
    <h3 id="profile-name"></h3>
    <p id="profile-email"></p>
  </div>
</div>

<nav class="menu">

<a href="dashboard.html">
<i class="fa-solid fa-chart-line"></i>
Dashboard
</a>

<a href="usermanagement.html">
<i class="fa-solid fa-users"></i>
User Management
</a>

<a href="coursemanagement.html">
<i class="fa-solid fa-graduation-cap"></i>
Course Management
</a>

<a class="active" href="useract.html">
<i class="fa-solid fa-file"></i>
Uploaded Activities
</a>

<a href="newsupdate.html">
<i class="fa-solid fa-plus"></i>
News Updates
</a>

</nav>

<button class="logout">
<i class="fa-solid fa-right-from-bracket"></i>
Logout
</button>

</aside>


<!-- MAIN -->
<main class="main">

<div class="activity-card">

<h2>Uploaded Activities</h2>

<div class="controls">

<input type="text" id="searchInput" placeholder="Search for users...">

<div class="date-filter">
  <button type="button" class="date-btn" id="dateBtn">
    <i class="fa-solid fa-calendar"></i> Date
  </button>
  <input type="date" id="dateFilter" class="date-input">
</div>

</div>

<table>

<thead>
<tr>
<th>No.</th>
<th>Name</th>
<th>Email</th>
<th>Status</th>
<th>Action</th>
</tr>
</thead>

<tbody id="activityTable">

<!-- JS WILL INSERT DATA HERE -->

</tbody>

</table>

</div>

</main>

</div>

</body>
</html>
